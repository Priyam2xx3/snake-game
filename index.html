<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Snake Game - Forest Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #2b3a25;
            /* Dark forest green background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            /* Prevent scrolling on mobile */
            user-select: none;
            -webkit-user-select: none;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            /* Let clicks pass through to canvas if needed */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 20px 30px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            font-size: 1.5rem;
            font-weight: bold;
            pointer-events: auto;
        }

        .score-box {
            background: rgba(43, 58, 37, 0.6);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid rgba(135, 179, 114, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            color: #e5f0dc;
        }

        /* Mobile Controls Styling */
        .controls-container {
            padding-bottom: 40px;
            display: flex;
            justify-content: center;
            pointer-events: auto;
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(3, 70px);
            gap: 15px;
        }

        .d-pad button {
            background: rgba(43, 58, 37, 0.6);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(135, 179, 114, 0.5);
            border-radius: 50%;
            color: #d1e2c4;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transition: all 0.1s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .d-pad button:active,
        .d-pad button.active-key {
            transform: scale(0.9);
            background: rgba(69, 94, 59, 0.7);
            border-color: #87b372;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .up {
            grid-column: 2;
            grid-row: 1;
        }

        .left {
            grid-column: 1;
            grid-row: 2;
        }

        .right {
            grid-column: 3;
            grid-row: 2;
        }

        .down {
            grid-column: 2;
            grid-row: 3;
        }

        @media (min-width: 768px) {
            .controls-container {
                display: none;
                /* Hide controls on desktop */
            }
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(20, 30, 15, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #d1e2c4;
            z-index: 100;
            pointer-events: auto;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #game-over-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #game-over-screen h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            color: #e25822;
            /* Flame/warning color */
            text-shadow: 0 0 20px rgba(226, 88, 34, 0.5);
        }

        #game-over-screen p {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        #game-over-screen button {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #4b7931 0%, #2b4919 100%);
            border: 2px solid #6b9e4d;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #game-over-screen button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.6);
            background: linear-gradient(135deg, #5b8c3c 0%, #365c20 100%);
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(20, 30, 15, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #d1e2c4;
            z-index: 101;
            pointer-events: auto;
            transition: opacity 0.5s ease;
        }

        #start-screen h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #87b372 0%, #4b7931 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        #start-screen button {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #4b7931 0%, #2b4919 100%);
            border: 2px solid #6b9e4d;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        #start-screen button.speed-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #87b372;
            color: #d1e2c4;
            padding: 10px 20px;
            font-size: 1rem;
            margin: 0 5px;
            transition: all 0.2s;
        }

        #start-screen button.speed-btn.selected,
        #start-screen button.speed-btn:hover {
            background: #4b7931;
            color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transform: scale(1.05);
        }

        .speed-selector {
            margin-top: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }
    </style>
    <!-- Include Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer">
        <div class="top-bar">
            <div class="score-box" id="score-display">Score: 0</div>
            <div class="score-box" id="high-score-display">High: 0</div>
        </div>

        <div class="controls-container">
            <div class="d-pad">
                <button class="up" id="btnUp">▲</button>
                <button class="left" id="btnLeft">◀</button>
                <button class="right" id="btnRight">▶</button>
                <button class="down" id="btnDown">▼</button>
            </div>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen">
        <h1>FOREST SNAKE</h1>
        <p>Use arrow keys or WASD to move.</p>

        <div class="speed-selector">
            <button class="speed-btn" onclick="setSpeed(300, this)">Slow</button>
            <button class="speed-btn selected" onclick="setSpeed(200, this)">Normal</button>
            <button class="speed-btn" onclick="setSpeed(120, this)">Fast</button>
        </div>

        <button onclick="startGame()">PLAY NOW</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen">
        <h1>GAME OVER</h1>
        <p id="final-score">Final Score: 0</p>
        <button onclick="resetGame()">PLAY AGAIN</button>
    </div>

    <script>
        // --- Game Setup & Variables ---
        const GRID_SIZE = 20; // 20x20 grid
        const CELL_SIZE = 1;
        const HALF_GRID = (GRID_SIZE * CELL_SIZE) / 2;

        let scene, camera, renderer;
        let snake = []; // Array of mesh segments
        let dir = { x: 1, z: 0 };
        let nextDir = { x: 1, z: 0 };
        let foodMesh;

        let score = 0;
        let highScore = localStorage.getItem("snake3DForestHighScore") || 0;
        let gameInterval;
        let lastMoveTime = 0;
        let chosenDelay = 200; // Default normal speed
        let moveDelay = 200; // ms between moves
        let isGameOver = true;

        // Materials (Forest Theme)
        const snakeHeadMat = new THREE.MeshStandardMaterial({
            color: 0x111111, // Black
            roughness: 0.8,
            metalness: 0.2,
            emissive: 0x000000
        });
        const snakeBodyMat = new THREE.MeshStandardMaterial({
            color: 0x1a1a1a, // Very dark gray/black
            roughness: 0.9,
            metalness: 0.1
        });
        const foodMat = new THREE.MeshStandardMaterial({
            color: 0xff3333, // Red apple
            roughness: 0.3,
            metalness: 0.1,
            emissive: 0x220000
        });
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });

        // Geometries
        // Use Spheres instead of Boxes for a more organic/realistic snake body
        const segmentGeo = new THREE.SphereGeometry(CELL_SIZE * 0.48, 16, 16);
        const foodGeo = new THREE.SphereGeometry(CELL_SIZE * 0.4, 16, 16);

        // UI Elements
        const scoreEl = document.getElementById("score-display");
        const highScoreEl = document.getElementById("high-score-display");
        const gameOverScreen = document.getElementById("game-over-screen");
        const finalScoreEl = document.getElementById("final-score");
        const startScreen = document.getElementById("start-screen");

        highScoreEl.innerText = `High: ${highScore}`;

        // --- Initialization ---
        function init3D() {
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111c0f); // Very dark green background
            scene.fog = new THREE.FogExp2(0x111c0f, 0.025);

            // Camera setup
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            updateCameraPosition();

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById("canvas-container").appendChild(renderer.domElement);

            // Lighting (Forest Canopy effect)
            const ambientLight = new THREE.AmbientLight(0x7fb573, 0.4); // Light green ambient light
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xb5e5a5, 1.0); // Light green sunlight
            sunLight.position.set(15, 25, 10);
            sunLight.castShadow = true;
            sunLight.shadow.camera.left = -HALF_GRID - 5;
            sunLight.shadow.camera.right = HALF_GRID + 5;
            sunLight.shadow.camera.top = HALF_GRID + 5;
            sunLight.shadow.camera.bottom = -HALF_GRID - 5;
            sunLight.shadow.bias = -0.001;
            scene.add(sunLight);

            // Add a subtle green underlight bouncing off grass
            const bounceLight = new THREE.PointLight(0x5ca944, 0.6, 30);
            bounceLight.position.set(0, -5, 0);
            scene.add(bounceLight);

            // Create Game Board (Forest Floor)
            createBoard();

            // Window resize handler
            window.addEventListener('resize', onWindowResize, false);

            // Start render loop
            requestAnimationFrame(renderLoop);
        }

        function updateCameraPosition() {
            const aspect = window.innerWidth / window.innerHeight;
            let dist = 18;
            if (aspect < 1) dist = 24;

            camera.position.set(0, dist, dist * 0.9);
            camera.lookAt(0, 0, 0);
        }

        function createTree(x, z) {
            const treeGroup = new THREE.Group();

            // Trunk
            const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 1, 5);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3219, roughness: 1.0 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 0.5;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            treeGroup.add(trunk);

            // Leaves
            const leavesGeo = new THREE.ConeGeometry(0.8, 2, 5);
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x1f3812, roughness: 0.9 });
            const leaves = new THREE.Mesh(leavesGeo, leavesMat);
            leaves.position.y = 1.6 + (Math.random() * 0.4); // Randomize height slightly
            leaves.castShadow = true;
            leaves.receiveShadow = true;

            // Randomize rotation for variety
            leaves.rotation.y = Math.random() * Math.PI;
            treeGroup.add(leaves);

            // Add a smaller second tier to some trees
            if (Math.random() > 0.5) {
                const leavesTop = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.5, 5), leavesMat);
                leavesTop.position.y = leaves.position.y + 0.8;
                leavesTop.castShadow = true;
                leavesTop.receiveShadow = true;
                treeGroup.add(leavesTop);
            }

            treeGroup.position.set(x, 0, z);

            // Randomly scale trees
            const scale = 0.8 + Math.random() * 0.6;
            treeGroup.scale.set(scale, scale, scale);

            return treeGroup;
        }

        function createBoard() {
            // The floor (Light matte green ground)
            const floorGeo = new THREE.PlaneGeometry(GRID_SIZE * CELL_SIZE + 10, GRID_SIZE * CELL_SIZE + 10);
            const floorMat = new THREE.MeshStandardMaterial({
                color: 0x8ab974, // Light matte green
                roughness: 1.0,
                metalness: 0.0
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -CELL_SIZE / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Create Forest Perimeter
            // Instead of walls, we place dense trees around the edge of the grid
            const margin = CELL_SIZE / 2;

            for (let i = -1; i <= GRID_SIZE; i++) {
                // Top border
                scene.add(createTree(i * CELL_SIZE - HALF_GRID + margin, -1 * CELL_SIZE - HALF_GRID + margin));
                if (Math.random() > 0.3) scene.add(createTree(i * CELL_SIZE - HALF_GRID + margin + (Math.random() - 0.5), -2 * CELL_SIZE - HALF_GRID + margin + (Math.random() - 0.5)));

                // Bottom border
                scene.add(createTree(i * CELL_SIZE - HALF_GRID + margin, GRID_SIZE * CELL_SIZE - HALF_GRID + margin));
                if (Math.random() > 0.3) scene.add(createTree(i * CELL_SIZE - HALF_GRID + margin + (Math.random() - 0.5), (GRID_SIZE + 1) * CELL_SIZE - HALF_GRID + margin + (Math.random() - 0.5)));

                // Left border (avoiding corners already done by Top/Bottom loops)
                if (i >= 0 && i < GRID_SIZE) {
                    scene.add(createTree(-1 * CELL_SIZE - HALF_GRID + margin, i * CELL_SIZE - HALF_GRID + margin));
                    if (Math.random() > 0.3) scene.add(createTree(-2 * CELL_SIZE - HALF_GRID + margin + (Math.random() - 0.5), i * CELL_SIZE - HALF_GRID + margin + (Math.random() - 0.5)));

                    // Right border
                    scene.add(createTree(GRID_SIZE * CELL_SIZE - HALF_GRID + margin, i * CELL_SIZE - HALF_GRID + margin));
                    if (Math.random() > 0.3) scene.add(createTree((GRID_SIZE + 1) * CELL_SIZE - HALF_GRID + margin + (Math.random() - 0.5), i * CELL_SIZE - HALF_GRID + margin + (Math.random() - 0.5)));
                }
            }
        }

        // --- Game Logic ---
        function setSpeed(delay, btnElement) {
            chosenDelay = delay;
            // Update UI
            document.querySelectorAll('.speed-btn').forEach(btn => btn.classList.remove('selected'));
            btnElement.classList.add('selected');
        }

        function startGame() {
            startScreen.style.opacity = 0;
            setTimeout(() => { startScreen.style.display = 'none'; }, 500);
            resetGame();
        }

        function resetGame() {
            isGameOver = false;
            score = 0;
            moveDelay = chosenDelay; // Apply the chosen speed
            dir = { x: 1, z: 0 };
            nextDir = { x: 1, z: 0 };
            updateScore();
            gameOverScreen.classList.remove('visible');

            // Clear existing snake meshes
            snake.forEach(segment => scene.remove(segment));
            snake = [];

            // Initial snake (length 3)
            for (let i = 0; i < 3; i++) {
                createSnakeSegment(-i, 0, i === 0);
            }

            spawnFood();

            lastMoveTime = performance.now();
        }

        function createSnakeSegment(gridX, gridZ, isHead) {
            let mesh;

            if (isHead) {
                // Head is a group that contains the sphere + eyes
                mesh = new THREE.Group();
                const headSphere = new THREE.Mesh(segmentGeo, snakeHeadMat);
                headSphere.castShadow = true;
                headSphere.receiveShadow = true;

                // Slightly oblong head
                headSphere.scale.set(1.1, 0.9, 1.2);
                mesh.add(headSphere);

                // Add eyes
                const eyeGeo = new THREE.SphereGeometry(CELL_SIZE * 0.1, 8, 8);

                const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
                leftEye.position.set(0.3, 0.2, 0.3); // Forward and up
                mesh.add(leftEye);

                const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
                rightEye.position.set(-0.3, 0.2, 0.3); // Forward and up
                mesh.add(rightEye);

            } else {
                // Body is just a sphere
                mesh = new THREE.Mesh(segmentGeo, snakeBodyMat);
                mesh.castShadow = true;
                mesh.receiveShadow = true;

                // Slightly squash body segments
                mesh.scale.set(1, 0.8, 1);
            }

            // Convert grid pos to world pos
            mesh.position.set(
                gridX * CELL_SIZE + (CELL_SIZE / 2) - HALF_GRID,
                -0.1, // Sits slightly into the ground for realism
                gridZ * CELL_SIZE + (CELL_SIZE / 2) - HALF_GRID
            );

            // Store logical grid coords on the mesh object for easy access
            mesh.userData = { gridX, gridZ, isHead };

            scene.add(mesh);
            snake.push(mesh);

            // Immediately apply rotation if it's the head
            if (isHead) updateHeadRotation(mesh);

            return mesh;
        }

        function updateHeadRotation(headMesh) {
            if (dir.x === 1) headMesh.rotation.y = Math.PI / 2;
            else if (dir.x === -1) headMesh.rotation.y = -Math.PI / 2;
            else if (dir.z === 1) headMesh.rotation.y = 0;
            else if (dir.z === -1) headMesh.rotation.y = Math.PI;
        }

        function spawnFood() {
            if (foodMesh) scene.remove(foodMesh);

            let validPos = false;
            let fx, fz;

            while (!validPos) {
                fx = Math.floor(Math.random() * GRID_SIZE);
                fz = Math.floor(Math.random() * GRID_SIZE);
                validPos = true;

                for (let seg of snake) {
                    if (seg.userData.gridX === fx && seg.userData.gridZ === fz) {
                        validPos = false;
                        break;
                    }
                }
            }

            // Add a small leaf to the apple
            foodMesh = new THREE.Group();

            const apple = new THREE.Mesh(foodGeo, foodMat);
            apple.castShadow = true;
            apple.receiveShadow = true;
            foodMesh.add(apple);

            const leafGeo = new THREE.ConeGeometry(0.1, 0.3, 4);
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x4b7931 });
            const leaf = new THREE.Mesh(leafGeo, leafMat);
            leaf.position.set(0, 0.4, 0);
            leaf.rotation.x = Math.PI / 4;
            foodMesh.add(leaf);

            foodMesh.position.set(
                fx * CELL_SIZE + (CELL_SIZE / 2) - HALF_GRID,
                0,
                fz * CELL_SIZE + (CELL_SIZE / 2) - HALF_GRID
            );
            foodMesh.userData = { gridX: fx, gridZ: fz };

            // Add soft point light to make food pop
            const foodLight = new THREE.PointLight(0xff5555, 0.5, 3);
            foodMesh.add(foodLight);

            scene.add(foodMesh);
            foodMesh.scale.set(0.1, 0.1, 0.1);
        }

        function gameTick() {
            if (isGameOver) return;

            dir = { ...nextDir };

            const head = snake[0];
            const newX = head.userData.gridX + dir.x;
            const newZ = head.userData.gridZ + dir.z;

            // Collision Check: Walls (Forest Boundary)
            if (newX < 0 || newX >= GRID_SIZE || newZ < 0 || newZ >= GRID_SIZE) {
                triggerGameOver();
                return;
            }

            // Collision Check: Self
            for (let i = 0; i < snake.length - 1; i++) {
                if (snake[i].userData.gridX === newX && snake[i].userData.gridZ === newZ) {
                    triggerGameOver();
                    return;
                }
            }

            let AteFood = false;
            if (newX === foodMesh.userData.gridX && newZ === foodMesh.userData.gridZ) {
                AteFood = true;
                score += 10;
                updateScore();
                // Speed scaling has been removed as per requirements (fixed speed during gameplay)
            }

            if (AteFood) {
                // When we eat food, we create a new head at the new position
                // The old head becomes a body segment
                // We keep all existing tails

                const oldHead = snake[0];

                // Replace old head Group with a simple body sphere to save performance and hide eyes
                scene.remove(oldHead);
                const newBodyPart = new THREE.Mesh(segmentGeo, snakeBodyMat);
                newBodyPart.castShadow = true;
                newBodyPart.receiveShadow = true;
                newBodyPart.scale.set(1, 0.8, 1);
                newBodyPart.position.copy(oldHead.position);
                newBodyPart.userData = { gridX: oldHead.userData.gridX, gridZ: oldHead.userData.gridZ, isHead: false };
                scene.add(newBodyPart);

                // Replace in array
                snake[0] = newBodyPart;

                // Create new head
                const newHead = createSnakeSegment(newX, newZ, true);

                // createSnakeSegment pushes to end; we need it at beginning
                snake.pop();
                snake.unshift(newHead);

                spawnFood();
            } else {
                // Normal Move
                // Move logic: we take the tail, make it the new head, and make the old head a body
                const oldTail = snake.pop();
                const oldHead = snake[0];

                // Replace old head with a body segment
                scene.remove(oldHead);
                const newBodyPart = new THREE.Mesh(segmentGeo, snakeBodyMat);
                newBodyPart.castShadow = true;
                newBodyPart.receiveShadow = true;
                newBodyPart.scale.set(1, 0.8, 1);
                newBodyPart.position.copy(oldHead.position);
                newBodyPart.userData = { gridX: oldHead.userData.gridX, gridZ: oldHead.userData.gridZ, isHead: false };
                scene.add(newBodyPart);

                snake[0] = newBodyPart;

                // Remove the old tail, replace with new head at new pos
                scene.remove(oldTail);
                const newHead = createSnakeSegment(newX, newZ, true);
                snake.pop(); // remove from end
                snake.unshift(newHead);
            }

            updateHeadRotation(snake[0]);
        }

        function triggerGameOver() {
            isGameOver = true;
            finalScoreEl.innerText = `Final Score: ${score}`;
            gameOverScreen.classList.add('visible');

            if (score > highScore) {
                highScore = score;
                localStorage.setItem("snake3DForestHighScore", highScore);
                highScoreEl.innerText = `High: ${highScore}`;
            }
        }

        function updateScore() {
            scoreEl.innerText = `Score: ${score}`;
        }

        // --- Render Loop ---
        function renderLoop() {
            requestAnimationFrame(renderLoop);

            const time = performance.now();

            if (!isGameOver && time - lastMoveTime > moveDelay) {
                gameTick();
                lastMoveTime = time;
            }

            // Animations
            if (foodMesh && foodMesh.scale.x < 1) {
                foodMesh.scale.x += 0.1;
                foodMesh.scale.y += 0.1;
                foodMesh.scale.z += 0.1;
            }

            // Add a slight breathing/slithering animation to the snake body
            if (!isGameOver) {
                for (let i = 1; i < snake.length; i++) {
                    const seg = snake[i];
                    seg.position.y = -0.1 + Math.sin(time * 0.005 - i * 0.5) * 0.05;
                }
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateCameraPosition();
        }

        // --- Controls Validation ---
        function setDirection(newDir) {
            // Prevent 180 degree turns
            if ((newDir === 'up' || newDir === 'w') && dir.z !== 1) nextDir = { x: 0, z: -1 };
            if ((newDir === 'down' || newDir === 's') && dir.z !== -1) nextDir = { x: 0, z: 1 };
            if ((newDir === 'left' || newDir === 'a') && dir.x !== 1) nextDir = { x: -1, z: 0 };
            if ((newDir === 'right' || newDir === 'd') && dir.x !== -1) nextDir = { x: 1, z: 0 };
        }

        // Keyboard Event Listener
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();

            if (k === 'arrowup' || k === 'w') document.getElementById('btnUp').classList.add('active-key');
            if (k === 'arrowdown' || k === 's') document.getElementById('btnDown').classList.add('active-key');
            if (k === 'arrowleft' || k === 'a') document.getElementById('btnLeft').classList.add('active-key');
            if (k === 'arrowright' || k === 'd') document.getElementById('btnRight').classList.add('active-key');

            if (["arrowup", "arrowdown", "arrowleft", "arrowright", "space", "w", "a", "s", "d"].includes(k)) {
                e.preventDefault();
            }

            if (isGameOver && k === 'enter') {
                if (startScreen.style.display !== 'none') {
                    startGame();
                } else {
                    resetGame();
                }
                return;
            }

            setDirection(k.replace('arrow', ''));
        });

        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'arrowup' || k === 'w') document.getElementById('btnUp').classList.remove('active-key');
            if (k === 'arrowdown' || k === 's') document.getElementById('btnDown').classList.remove('active-key');
            if (k === 'arrowleft' || k === 'a') document.getElementById('btnLeft').classList.remove('active-key');
            if (k === 'arrowright' || k === 'd') document.getElementById('btnRight').classList.remove('active-key');
        });

        // Mobile Event Listeners
        const attachTouchableBtn = (id, directionString) => {
            const btn = document.getElementById(id);
            const trigger = (e) => {
                e.preventDefault();
                setDirection(directionString);
            };
            btn.addEventListener('touchstart', trigger, { passive: false });
            btn.addEventListener('mousedown', trigger);
        };

        attachTouchableBtn('btnUp', 'up');
        attachTouchableBtn('btnDown', 'down');
        attachTouchableBtn('btnLeft', 'left');
        attachTouchableBtn('btnRight', 'right');

        // Boot up
        init3D();
    </script>
</body>

</html>
